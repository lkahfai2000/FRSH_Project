.dot { width: 8px; height: 8px; border-radius: 2px; }
#canvas-container {
  position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
}
#c { display: block; }
.zpanel {
  position: fixed; width: 360px; z-index: 200;

}
.zhead {

  border-bottom: 1px solid #f1f5f9;
}
.zbody { overflow-y: auto; padding: 10px 13px; display: flex; flex-direction: column; gap: 6px; }
.zbody::-webkit-scrollbar { width: 3px; }
.zbody::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
.zchip {
  border-radius: 5px; padding: 2px 7px; font-size: 9px;
  font-weight: 700; cursor: pointer; border: 1px solid;
  flex-shrink: 0;
}
.zclose {
  background: #f1f5f9; border: 1px solid #e2e8f0;
  border-radius: 5px; padding: 2px 6px;
  cursor: pointer; font-size: 12px; color: #64748b;
}
#hint {

];

const LANES = [
  { y:35,  h:100, fill:'#eef2ff', tc:'#4f46e5', lb:'BUSINESS & SERVICE LAYER' },
  { y:185, h:100, fill:'#e0f2fe', tc:'#0369a1', lb:'IT OPERATIONS LAYER' },
  { y:355, h:115, fill:'#ecfdf5', tc:'#047857', lb:'OBSERVABILITY & MONITORING LAYER' },
  { y:545, h:115, fill:'#fffbeb', tc:'#b45309', lb:'ASSET, CONFIG & DISCOVERY LAYER' },
  { y:730, h:110, fill:'#f5f3ff', tc:'#7c3aed', lb:'CLOUD & INFRASTRUCTURE LAYER' },
  { y:910, h:120, fill:'#fff1f2', tc:'#be123c', lb:'SECURITY LAYER' },
  { y:1080,h:90,  fill:'#f0fdfa', tc:'#0f766e', lb:'DEVOPS & PLATFORM ENGINEERING' },
];

// ============================================================
// CANVAS STATE
// ============================================================
const container = document.getElementById('canvas-container');
const canvas    = document.getElementById('c');
const ctx       = canvas.getContext('2d');

// Mutable node positions
const pos = {};
for (const [id, n] of Object.entries(NODES)) pos[id] = { x: n.x, y: n.y };

let sc = 0.72, panX = 0, panY = 0;
let hovEdge = -1, pinEdge = -1, pinNode = null;

// Interaction
let iMode = 'idle'; // 'idle' | 'pan' | 'node'
let dragId = null, dragOX = 0, dragOY = 0;
let panSX = 0, panSY = 0, panSPX = 0, panSPY = 0;
let moved = false;

// ============================================================
// RESIZE
// ============================================================
function resize() {
  canvas.width  = container.clientWidth  || window.innerWidth;
  canvas.height = container.clientHeight || (window.innerHeight - 48);
  draw();
}
window.addEventListener('resize', resize);
// Defer first resize so layout is complete
window.addEventListener('load', resize);
// Also call now in case load already fired
setTimeout(resize, 0);

// ============================================================
// COORDINATE HELPERS
// ============================================================
function toWorld(cx, cy) {
  return { x: (cx - panX) / sc, y: (cy - panY) / sc };
}
function canvasXY(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

// ============================================================
// GEOMETRY
// ============================================================
function edgePts(e) {
  const f = pos[e.f], t = pos[e.t];
  const dx = t.x - f.x, dy = t.y - f.y;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const nx = dx/len, ny = dy/len;
  const sx = f.x + nx*(NW/2 + 2),  sy = f.y + ny*(NH/2 + 2);
  const ex = t.x - nx*(NW/2 + 10), ey = t.y - ny*(NH/2 + 10);
  const mx = (sx+ex)/2, my = (sy+ey)/2;
  const cv = e.cv || 0;
  const base = Math.min(60, len*0.18);
  const cpx = mx - ny*(base + cv), cpy = my + nx*(base + cv);
  return { sx, sy, ex, ey, cpx, cpy };
}

function bezPt(p, t) {
  const u = 1-t;
  return { x: u*u*p.sx + 2*u*t*p.cpx + t*t*p.ex,
           y: u*u*p.sy + 2*u*t*p.cpy + t*t*p.ey };
}

function edgeHit(e, wx, wy) {
  const p = edgePts(e);
  for (let t = 0; t <= 1; t += 0.025) {
    const pt = bezPt(p, t);
    if (Math.abs(pt.x - wx) < 10 && Math.abs(pt.y - wy) < 10) return true;
  }
  return false;
}

function nodeHit(wx, wy) {
  for (const id of Object.keys(NODES)) {
    const p = pos[id];
    if (wx >= p.x-NW/2 && wx <= p.x+NW/2 && wy >= p.y-NH/2 && wy <= p.y+NH/2) return id;
  }
  return null;
}

// ============================================================
// DRAW HELPERS
// ============================================================
function drawRR(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y,   x+w, y+r,   r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x,   y+h, x,   y+h-r, r);
  ctx.lineTo(x,   y+r); ctx.arcTo(x,   y,   x+r, y,     r);
  ctx.closePath();
}

function drawArrowHead(ex, ey, cpx, cpy, col, sz) {
  const dx = ex-cpx, dy = ey-cpy, len = Math.sqrt(dx*dx+dy*dy) || 1;
  const nx = dx/len, ny = dy/len;
  ctx.save();
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - nx*sz - ny*sz*0.55, ey - ny*sz + nx*sz*0.55);
  ctx.lineTo(ex - nx*sz + ny*sz*0.55, ey - ny*sz - nx*sz*0.55);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function hexA(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw() {
  const W = canvas.width, H = canvas.height;
  if (!W || !H) return;

  ctx.clearRect(0, 0, W, H);

  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(sc, sc);

  // Determine which edges are "active" (highlighted)
  const activeSet = new Set();
  if (pinNode) {
    EDGES.forEach(e => { if (e.f === pinNode || e.t === pinNode) activeSet.add(e.id); });
  } else if (pinEdge >= 0) {
    activeSet.add(pinEdge);
  }
  const hasPin = pinNode || pinEdge >= 0;
  // Hover works only when no pin, or edge belongs to pinned node
  const effectiveHov = (hovEdge >= 0 && (!hasPin || activeSet.has(hovEdge))) ? hovEdge : -1;

  // ── LAYER 1: swim lane backgrounds ──
  LANES.forEach(function(ln) {
    ctx.save();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = ln.fill;
    drawRR(0, ln.y, 1500, ln.h, 10);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.font = '500 13px Figtree, sans-serif';
    ctx.textBaseline = 'top';
    ctx.fillStyle = ln.tc;
    ctx.fillText(ln.lb, 14, ln.y + 8);
    ctx.restore();
  });

  // ── LAYER 2: edge lines ──
  EDGES.forEach(function(e) {
    const p = edgePts(e);
    const isFront = activeSet.has(e.id) || e.id === effectiveHov;
    const isDim   = hasPin && !isFront;
    const alpha   = isDim ? 0.07 : (isFront ? 1 : 0.35);
    const lw      = isFront ? 3 : 1.4;
    const col     = isDim ? '#d1d5db' : e.color;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Glow halo for active edges
    if (isFront) {
      ctx.beginPath();
      ctx.moveTo(p.sx, p.sy);
      ctx.quadraticCurveTo(p.cpx, p.cpy, p.ex, p.ey);
      ctx.strokeStyle = hexA(e.color, 0.15);
      ctx.lineWidth = 12;
      ctx.stroke();
    }

    // Main line
    ctx.beginPath();
    ctx.moveTo(p.sx, p.sy);
    ctx.quadraticCurveTo(p.cpx, p.cpy, p.ex, p.ey);
    ctx.strokeStyle = col;
    ctx.lineWidth   = lw;
    ctx.setLineDash(e.dir === 'bwd' ? [6,3] : []);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrow at destination
    drawArrowHead(p.ex, p.ey, p.cpx, p.cpy, col, isFront ? 9 : 6);
    // For bidirectional, also arrow at source
    if (e.dir === 'both') drawArrowHead(p.sx, p.sy, p.cpx, p.cpy, col, isFront ? 9 : 6);

    ctx.restore();
  });

  // ── LAYER 3: node boxes ──
  Object.entries(NODES).forEach(function(entry) {
    const id = entry[0], nd = entry[1];
    const p  = pos[id];
    const isPin = pinNode === id;
    const isDrag = dragId === id;
    const connIds = new Set(EDGES.filter(e => e.f===id||e.t===id).map(e=>e.id));
    const isActive = hasPin && (isPin || [...connIds].some(eid => activeSet.has(eid)));
    const isDim = hasPin && !isActive;
    const cnt = connIds.size;

    ctx.save();
    ctx.globalAlpha = isDim ? 0.18 : 1;

    // Drop shadow
    ctx.shadowColor = 'rgba(0,0,0,0.10)';
    ctx.shadowBlur  = isDrag ? 20 : (isPin ? 14 : 5);

    // Background rect
    ctx.fillStyle = nd.bg;
    drawRR(p.x-NW/2, p.y-NH/2, NW, NH, 9);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Border
    ctx.strokeStyle = (isPin || isDrag) ? nd.color : '#e2e8f0';
    ctx.lineWidth   = (isPin || isDrag) ? 2.5 : 1.2;
    drawRR(p.x-NW/2, p.y-NH/2, NW, NH, 9);
    ctx.stroke();

    // Left colour bar
    ctx.fillStyle = nd.color;
    drawRR(p.x-NW/2, p.y-NH/2, 4, NH, 2);
    ctx.fill();

    // Label text
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.font         = 'bold 11.5px Figtree, sans-serif';
    ctx.fillStyle    = isDim ? '#94a3b8' : nd.color;
    ctx.fillText(nd.label, p.x + 4, p.y - 5);

    // Sub-label
    ctx.font      = '400 8px Figtree, sans-serif';
    ctx.fillStyle = isDim ? '#d1d5db' : '#64748b';
    const sub     = nd.full.length > 28 ? nd.full.slice(0,26)+'\u2026' : nd.full;
    ctx.fillText(sub, p.x + 4, p.y + 10);

    // Badge (connection count)
    if (!isDim) {
      ctx.beginPath();
      ctx.arc(p.x + NW/2 - 2, p.y - NH/2 + 2, 9, 0, Math.PI*2);
      ctx.fillStyle    = nd.color;
      ctx.globalAlpha  = 0.92;
      ctx.fill();
      ctx.globalAlpha  = 1;
      ctx.font         = 'bold 7.5px Figtree, sans-serif';
      ctx.fillStyle    = '#fff';
      ctx.fillText(String(cnt), p.x + NW/2 - 2, p.y - NH/2 + 2);
    }

    ctx.restore();
  });

  // ── LAYER 4: label bubble — only ONE at a time, always topmost ──
  const lblId = (effectiveHov >= 0) ? effectiveHov : (pinEdge >= 0 ? pinEdge : -1);
  if (lblId >= 0) {
    const e  = EDGES[lblId];
    const pt = bezPt(edgePts(e), 0.5);
    const lines = e.label;
    const LW = 155, LH = lines.length * 18 + 22;
    const lx = pt.x, ly = pt.y;

    ctx.save();
    // Shadow
    ctx.shadowColor = hexA(e.color, 0.3);
    ctx.shadowBlur  = 20;
    ctx.fillStyle   = '#ffffff';
    drawRR(lx - LW/2, ly - LH/2, LW, LH, 10);
    ctx.fill();
    ctx.shadowBlur  = 0;

    // Border
    ctx.strokeStyle = e.color;
    ctx.lineWidth   = 2.5;
    drawRR(lx - LW/2, ly - LH/2, LW, LH, 10);
    ctx.stroke();

    // Text
    ctx.font         = 'bold 10px Figtree, sans-serif';
    ctx.fillStyle    = '#1e293b';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    lines.forEach(function(ln, i) {
      ctx.fillText(ln, lx, ly - LH/2 + 15 + i*18);
    });
    ctx.restore();
  }

  ctx.restore(); // end transform
}

// ============================================================
// MOUSE EVENTS
// ============================================================
canvas.addEventListener('mousedown', function(e) {
  e.preventDefault();
  const {x:cx, y:cy} = canvasXY(e);
  const {x:wx, y:wy} = toWorld(cx, cy);
  moved = false;
  const n = nodeHit(wx, wy);
  if (n) {
    iMode = 'node';
    dragId = n;
    dragOX = wx - pos[n].x;
    dragOY = wy - pos[n].y;
    canvas.style.cursor = 'grabbing';
  } else {
    iMode = 'pan';
    panSX = cx; panSY = cy;
    panSPX = panX; panSPY = panY;
    canvas.style.cursor = 'grabbing';
  }
});

window.addEventListener('mousemove', function(e) {
  if (iMode === 'node' && dragId) {
    const {x:cx, y:cy} = canvasXY(e);
    const {x:wx, y:wy} = toWorld(cx, cy);
    pos[dragId] = { x: wx - dragOX, y: wy - dragOY };
    moved = true;
    draw();
    return;
  }
  if (iMode === 'pan') {
    const {x:cx, y:cy} = canvasXY(e);
    const dx = cx - panSX, dy = cy - panSY;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) moved = true;
    panX = panSPX + dx;
    panY = panSPY + dy;
    draw();
    return;
  }
  // Hover detection in idle mode
  const {x:cx, y:cy} = canvasXY(e);
  const {x:wx, y:wy} = toWorld(cx, cy);
  if (nodeHit(wx, wy)) { canvas.style.cursor = 'grab'; return; }
  let found = -1;
  for (let i = EDGES.length-1; i >= 0; i--) {
    if (edgeHit(EDGES[i], wx, wy)) { found = EDGES[i].id; break; }
  }
  canvas.style.cursor = found >= 0 ? 'pointer' : 'default';
  if (found !== hovEdge) { hovEdge = found; draw(); }
});

window.addEventListener('mouseup', function(e) {
  const wasMoved = moved;
  const wasMode  = iMode;
  iMode  = 'idle';
  dragId = null;
  moved  = false;
  canvas.style.cursor = 'default';

  if (!wasMoved) {
    // It's a click
    const {x:cx, y:cy} = canvasXY(e);
    const {x:wx, y:wy} = toWorld(cx, cy);
    const n = nodeHit(wx, wy);
    if (n) {
      if (pinNode === n) { pinNode = null; hidePanel(); }
      else { pinNode = n; pinEdge = -1; showNodePanel(n); }
    } else {
      let found = -1;
      for (let i = EDGES.length-1; i >= 0; i--) {
        if (edgeHit(EDGES[i], wx, wy)) { found = EDGES[i].id; break; }
      }
      if (found >= 0) {
        if (pinEdge === found) { pinEdge = -1; hidePanel(); }
        else { pinEdge = found; pinNode = null; showEdgePanel(found); }
      } else {
        pinNode = null; pinEdge = -1; hidePanel();
      }
    }
  }
  draw();
});

canvas.addEventListener('mouseleave', function() {
  if (hovEdge >= 0) { hovEdge = -1; draw(); }
});

canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  const {x:cx, y:cy} = canvasXY(e);
  const wx = (cx - panX) / sc, wy = (cy - panY) / sc;
  sc = Math.min(2.5, Math.max(0.25, sc * (1 - e.deltaY * 0.001)));
  panX = cx - wx * sc;
  panY = cy - wy * sc;
  draw();
}, { passive: false });

// ============================================================
// PANEL
// ============================================================
const panel = document.getElementById('zpanel');
let panelDrag = false, panelOX = 0, panelOY = 0;

panel.querySelector && panel.addEventListener('mousedown', function(e) {
  const head = e.target.closest('.zhead');
  if (!head || e.target.closest('.zclose')) return;
  panelDrag = true;
  panelOX = e.clientX - panel.offsetLeft;
  panelOY = e.clientY - panel.offsetTop;
  e.preventDefault();
});
window.addEventListener('mousemove', function(e) {
  if (!panelDrag) return;
  panel.style.left = (e.clientX - panelOX) + 'px';
  panel.style.top  = (e.clientY - panelOY) + 'px';
});
window.addEventListener('mouseup', function() { panelDrag = false; });

function openPanel(borderColor, html, left, top) {
  panel.style.border  = '2px solid ' + borderColor;
  panel.style.left    = left + 'px';
  panel.style.top     = top  + 'px';
  panel.style.display = 'flex';
  panel.innerHTML     = html;
}
function hidePanel() {
  panel.style.display = 'none';
}

function chipStyle(nd) {
  return 'background:' + nd.bg + ';border-color:' + nd.color + '88;color:' + nd.color;
}

function showNodePanel(nid) {
  const nd  = NODES[nid];
  const out = EDGES.filter(e => e.f === nid);
  const inc = EDGES.filter(e => e.t === nid);
  const grip = '<div style="display:flex;gap:3px;opacity:0.4">'
    + [0,1,2].map(() =>
        '<div style="display:flex;flex-direction:column;gap:3px">'
        + '<div style="width:3px;height:3px;border-radius:50%;background:'+nd.color+'"></div>'
        + '<div style="width:3px;height:3px;border-radius:50%;background:'+nd.color+'"></div>'
        + '</div>').join('')
    + '</div>';

  let h = '<div class="zhead" style="background:linear-gradient(135deg,'+nd.color+'12,'+nd.color+'03);border-bottom:1px solid '+nd.color+'22">'
    + '<div style="display:flex;align-items:center;gap:8px">' + grip
    + '<div><div style="font-size:13px;font-weight:800;color:'+nd.color+'">'+nd.label+'</div>'
    + '<div style="font-size:10px;color:#64748b;margin-top:1px">'+nd.full+'</div></div></div>'
    + '<button class="zclose" onclick="pinNode=null;hidePanel();draw()">&#x2715;</button></div>'
    + '<div class="zbody">';

  if (out.length) {
    h += '<div style="font-size:8.5px;font-weight:700;color:#94a3b8;letter-spacing:1.5px;text-transform:uppercase;font-family:monospace;margin-bottom:3px">Sends data to (' + out.length + ')</div>';
    out.forEach(e => {
      const tn = NODES[e.t];
      h += '<div style="display:flex;gap:7px;align-items:flex-start;padding:5px 0;border-bottom:1px solid #f8fafc">'
        + '<div class="zchip" style="'+chipStyle(tn)+'" onclick="switchNode(\''+e.t+'\')">&rarr;&nbsp;'+tn.label+'</div>'
        + '<div style="font-size:10px;color:#475569;line-height:1.5">' + e.label.join(' &middot; ') + '</div></div>';
    });
  }
  if (inc.length) {
    h += '<div style="font-size:8.5px;font-weight:700;color:#94a3b8;letter-spacing:1.5px;text-transform:uppercase;font-family:monospace;margin:6px 0 3px">Receives from (' + inc.length + ')</div>';
    inc.forEach(e => {
      const fn = NODES[e.f];
      h += '<div style="display:flex;gap:7px;align-items:flex-start;padding:5px 0;border-bottom:1px solid #f8fafc">'
        + '<div class="zchip" style="'+chipStyle(fn)+'" onclick="switchNode(\''+e.f+'\')">&larr;&nbsp;'+fn.label+'</div>'
        + '<div style="font-size:10px;color:#475569;line-height:1.5">' + e.label.join(' &middot; ') + '</div></div>';
    });
  }
  h += '</div>';
  openPanel(nd.color, h, 16, Math.max(52, window.innerHeight - 460));
}

function showEdgePanel(eid) {
  const e  = EDGES[eid];
  const fn = NODES[e.f], tn = NODES[e.t];
  const dir = e.dir === 'both' ? '&#x21c4;' : (e.dir === 'bwd' ? '&larr;' : '&rarr;');
  const dirlbl = e.dir === 'both' ? 'Bidirectional' : (e.dir === 'bwd' ? 'Reverse' : 'Forward');
  const grip = '<div style="display:flex;gap:3px;opacity:0.4">'
    + [0,1,2].map(() =>
        '<div style="display:flex;flex-direction:column;gap:3px">'
        + '<div style="width:3px;height:3px;border-radius:50%;background:'+e.color+'"></div>'
        + '<div style="width:3px;height:3px;border-radius:50%;background:'+e.color+'"></div>'
        + '</div>').join('')
    + '</div>';

  let h = '<div class="zhead" style="background:linear-gradient(135deg,'+e.color+'12,'+e.color+'03);border-bottom:1px solid '+e.color+'22">'
    + '<div style="display:flex;align-items:center;gap:8px">' + grip
    + '<div style="font-size:13px;font-weight:800;color:'+e.color+'">Integration Flow</div></div>'
    + '<button class="zclose" onclick="pinEdge=-1;hidePanel();draw()">&#x2715;</button></div>'
    + '<div class="zbody">'
    + '<div style="display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1px solid #f1f5f9">'
    + '<div class="zchip" style="'+chipStyle(fn)+'" onclick="switchNode(\''+e.f+'\')">'+fn.label+'</div>'
    + '<div style="font-size:17px;color:'+e.color+'">'+dir+'</div>'
    + '<div class="zchip" style="'+chipStyle(tn)+'" onclick="switchNode(\''+e.t+'\')">'+tn.label+'</div></div>'
    + '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 11px">'
    + '<div style="font-size:8.5px;font-weight:700;color:#94a3b8;letter-spacing:1.5px;text-transform:uppercase;font-family:monospace;margin-bottom:5px">Data exchanged</div>'
    + e.label.map(it =>
        '<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:4px">'
        + '<div style="width:5px;height:5px;border-radius:50%;background:'+e.color+';margin-top:5px;flex-shrink:0"></div>'
        + '<span style="font-size:11.5px;color:#334155;line-height:1.5">'+it+'</span></div>'
      ).join('')
    + '</div>'
    + '<div style="font-size:10px;color:#94a3b8">Direction: ' + dirlbl + '</div>'
    + '</div>';
  openPanel(e.color, h, Math.max(0, window.innerWidth - 390), Math.max(52, window.innerHeight - 360));
}

function switchNode(nid) {
  pinNode = nid; pinEdge = -1;
  showNodePanel(nid);
  draw();
}

function zoomBy(d) {
  sc = Math.min(2.5, Math.max(0.25, sc + d));
  draw();
}
function resetView() {
  sc = 0.72; panX = 0; panY = 0; draw();
}
</script>
